name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: expo-app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: expo-app/package-lock.json
      - run: npm ci
      - run: npm run lint
      # Use the typecheck script (node --stack-size=16000) — plain `tsc` crashes
      # on this codebase with RangeError: Maximum call stack size exceeded.
      # Code is 0-error; the crash is a V8 default-stack limit, not a type error.
      - run: npm run typecheck

  test:
    name: Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: expo-app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: expo-app/package-lock.json
      - run: npm ci
      - run: npm test -- --coverage --ci
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: expo-app/coverage/

  eas-build:
    name: EAS Build Check
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [lint-and-typecheck, test]
    # Never block CI on this convenience check. Without an EXPO_TOKEN secret the
    # build cannot run, and auto-triggering a paid cloud build on every main
    # merge is disallowed by policy (builds must be run with `eas build --local`).
    # The steps below short-circuit when the token is absent.
    continue-on-error: true
    defaults:
      run:
        working-directory: expo-app
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
    steps:
      - name: Skip note when EXPO_TOKEN is not configured
        if: env.EXPO_TOKEN == ''
        working-directory: ${{ github.workspace }}
        run: echo "EXPO_TOKEN secret not set — skipping EAS Build Check (non-blocking)."
      - uses: actions/checkout@v4
        if: env.EXPO_TOKEN != ''
      - uses: actions/setup-node@v4
        if: env.EXPO_TOKEN != ''
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: expo-app/package-lock.json
      - uses: expo/expo-github-action@v8
        if: env.EXPO_TOKEN != ''
        with:
          eas-version: latest
          token: ${{ env.EXPO_TOKEN }}
      - run: npm ci
        if: env.EXPO_TOKEN != ''
      - run: eas build --platform all --profile production --non-interactive --no-wait
        if: env.EXPO_TOKEN != ''
