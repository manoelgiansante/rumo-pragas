name: PR Check

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      app: ${{ steps.filter.outputs.app }}
      supabase: ${{ steps.filter.outputs.supabase }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            app:
              - 'expo-app/**'
            supabase:
              - 'supabase/**'

  app-check:
    name: App Quality
    needs: changes
    if: needs.changes.outputs.app == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: expo-app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: expo-app/package-lock.json
      - run: npm ci
      - run: npm run lint
      # Use the typecheck script (node --stack-size=16000) — plain `tsc` crashes
      # on this codebase with RangeError: Maximum call stack size exceeded.
      # Code is 0-error; the crash is a V8 default-stack limit, not a type error.
      - run: npm run typecheck
      - run: npm test -- --ci
