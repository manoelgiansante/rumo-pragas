# Auth flow — logs in with test credentials using testIDs (post 2026-05-20 QA audit).
# Skips onboarding if present, enters email+password, taps "Entrar".
# Validates landing on the authenticated home screen.
appId: com.agrorumo.rumopragas
tags:
  - auth
---
- launchApp:
    clearState: true
    stopApp: true

- extendedWaitUntil:
    visible:
      text: ".*"
    timeout: 20000

# Skip onboarding if visible — uses dedicated testID added in QA audit
- runFlow:
    when:
      visible:
        id: "onboarding-skip"
    commands:
      - tapOn:
          id: "onboarding-skip"
          optional: true

# If already logged in, log out via settings tab — best-effort
- runFlow:
    when:
      visible:
        id: "home-cta-diagnose"
    commands:
      - tapOn:
          id: "tab-settings"
          optional: true
      - scroll
      - tapOn:
          id: "settings-signout"
          optional: true
      - tapOn:
          text: "Sair"
          optional: true

# Ensure we are on the login segmented control
- extendedWaitUntil:
    visible:
      id: "login-segment-login"
    timeout: 10000

- assertVisible:
    id: "login-segment-login"

# Force "Login" segment in case signup tab was last active
- tapOn:
    id: "login-segment-login"
    optional: true

- tapOn:
    id: "login-input-email"
- inputText: ${TEST_EMAIL}
- hideKeyboard

- tapOn:
    id: "login-input-password"
- inputText: ${TEST_PASSWORD}
- hideKeyboard

- tapOn:
    id: "login-submit"

# Wait for authenticated home to render
- extendedWaitUntil:
    visible:
      id: "home-cta-diagnose"
    timeout: 30000

- assertVisible:
    id: "home-cta-diagnose"
- takeScreenshot: auth-logged-in
