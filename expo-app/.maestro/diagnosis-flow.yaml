# Diagnosis flow — Home → Camera (gallery picker) → Crop select → Loading → Results.
# Uses gallery (not live camera) for determinism on emulators/simulators.
# Uses testIDs added in 2026-05-20 QA audit.
#
# Note: picker selection is handled natively and may require a fixture image in
# the simulator/emulator photo library. On Android, pre-load a test image via:
#   adb push test-pest.jpg /sdcard/Download/
#   adb shell am broadcast -a android.intent.action.MEDIA_SCANNER_SCAN_FILE -d file:///sdcard/Download/test-pest.jpg
appId: com.agrorumo.rumopragas
tags:
  - diagnosis
---
- runFlow: auth-flow.yaml

# From home, tap diagnose CTA
- extendedWaitUntil:
    visible:
      id: "home-cta-diagnose"
    timeout: 15000
- tapOn:
    id: "home-cta-diagnose"

# Camera entry screen
- extendedWaitUntil:
    visible:
      id: "diagnosis-camera-capture"
    timeout: 10000
- assertVisible:
    id: "diagnosis-camera-capture"
- assertVisible:
    id: "diagnosis-camera-gallery"
- takeScreenshot: diag-camera-entry

# Use gallery for a reproducible run
- tapOn:
    id: "diagnosis-camera-gallery"

# Handle native permission dialog (iOS + Android). Accept in all variants.
- runFlow:
    when:
      visible: "Allow"
    commands:
      - tapOn: "Allow"
- runFlow:
    when:
      visible: "Permitir"
    commands:
      - tapOn: "Permitir"
- runFlow:
    when:
      visible: "Allow Access to All Photos"
    commands:
      - tapOn: "Allow Access to All Photos"

# Pick the first image from the native picker — selector varies per platform
- runFlow:
    when:
      visible: "Photos"
    commands:
      - tapOn:
          point: "25%,40%"
          optional: true
- runFlow:
    when:
      visible: "Recents"
    commands:
      - tapOn:
          point: "25%,40%"
          optional: true
- runFlow:
    when:
      visible: "Galeria"
    commands:
      - tapOn:
          point: "25%,40%"
          optional: true

# iOS "Choose" confirmation button after cropping
- tapOn:
    text: "Choose"
    optional: true
- tapOn:
    text: "Escolher"
    optional: true
- tapOn:
    text: "Done"
    optional: true

# Crop-select screen — should land on it after image picked
- extendedWaitUntil:
    visible:
      id: "cropselect-start-diagnosis"
    timeout: 30000
- assertVisible:
    id: "cropselect-start-diagnosis"
- takeScreenshot: diag-crop-select

# Pick soy crop explicitly (deterministic; first item in CROPS)
- tapOn:
    id: "cropselect-crop-soja"
    optional: true

- tapOn:
    id: "cropselect-start-diagnosis"

# Loading screen — any of the steps are valid
- extendedWaitUntil:
    visible:
      text: "(Preparando|Enviando|Identificando|Processando).*"
    timeout: 15000
- takeScreenshot: diag-loading

# Results screen — expect either pest detected or healthy plant or queued
- extendedWaitUntil:
    visible:
      text: "(Praga Detectada|Planta Saudável|Novo Diagnóstico|Diagnóstico|Em fila)"
    timeout: 60000
- takeScreenshot: diag-result

- assertVisible:
    text: "(Praga Detectada|Planta Saudável|Novo Diagnóstico|Diagnóstico|Em fila)"
