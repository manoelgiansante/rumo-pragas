# History flow — navigates to History tab and verifies the screen.
# Uses testIDs (2026-05-20 QA audit). Passes whether the list is populated
# or empty (empty-state CTA visible).
appId: com.agrorumo.rumopragas
tags:
  - history
---
- runFlow: auth-flow.yaml

- extendedWaitUntil:
    visible:
      id: "home-cta-diagnose"
    timeout: 15000

- tapOn:
    id: "tab-history"

# Either history search input OR empty-state CTA is visible
- extendedWaitUntil:
    visible:
      text: "(Histórico|Buscar|Nenhum|diagnóstico)"
    timeout: 10000

- takeScreenshot: history-list

# Exercise the search input — testID added in QA audit
- runFlow:
    when:
      visible:
        id: "history-search-input"
    commands:
      - tapOn:
          id: "history-search-input"
      - inputText: "soja"
      - hideKeyboard
      - takeScreenshot: history-search
      - tapOn:
          id: "history-search-clear"
          optional: true

# Empty-state CTA path
- runFlow:
    when:
      visible:
        id: "history-empty-cta-start"
    commands:
      - assertVisible:
          id: "history-empty-cta-start"
