# Paywall flow — opens the paywall from Settings, verifies plans + restore visible.
# Uses testIDs (2026-05-20 QA audit). Apple Guideline 3.1.1: Restore Purchases
# MUST be reachable. Apple 3.1.2: subscription management link required when on
# a paid plan.
appId: com.agrorumo.rumopragas
tags:
  - paywall
  - subscription
---
- runFlow: auth-flow.yaml

- extendedWaitUntil:
    visible:
      id: "home-cta-diagnose"
    timeout: 15000

# Primary entry: Settings tab → Upgrade row → paywall opens as modal
- tapOn:
    id: "tab-settings"

- extendedWaitUntil:
    visible:
      id: "settings-row-current-plan"
    timeout: 10000

# Try direct upgrade row (free users only). If not free, tap restore — opens RC restore.
- runFlow:
    when:
      visible:
        id: "settings-upgrade-plan"
    commands:
      - tapOn:
          id: "settings-upgrade-plan"

# Paywall should be visible — at least the close button is rendered
- extendedWaitUntil:
    visible:
      id: "paywall-close"
    timeout: 15000

- assertVisible:
    id: "paywall-close"
- assertVisible:
    id: "paywall-plan-free"
- assertVisible:
    id: "paywall-plan-pro"
- assertVisible:
    id: "paywall-plan-enterprise"
- assertVisible:
    id: "paywall-cta-subscribe"
# Apple Guideline 3.1.1: Restore Purchases must always be visible
- assertVisible:
    id: "paywall-restore-purchases"
- assertVisible:
    id: "paywall-legal-privacy"
- assertVisible:
    id: "paywall-legal-terms"

- takeScreenshot: paywall-plans

# Switch plans to validate selection state
- tapOn:
    id: "paywall-plan-pro"
- assertVisible:
    id: "paywall-cta-subscribe"

- tapOn:
    id: "paywall-plan-enterprise"
- assertVisible:
    id: "paywall-cta-subscribe"

# Validate legal text fragment
- assertVisible:
    text: "(Pop|Recursos|Assinar|Continuar)"

# Close paywall
- tapOn:
    id: "paywall-close"

# Back on settings — ensure we returned
- extendedWaitUntil:
    visible:
      id: "settings-row-current-plan"
    timeout: 10000
