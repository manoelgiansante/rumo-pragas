# Smoke test — launches the app and confirms the main UI renders.
# Uses testIDs (added 2026-05-20 QA audit) for stable selectors.
# Does NOT require auth: onboarding + login screens are valid landing targets.
appId: com.agrorumo.rumopragas
tags:
  - smoke
---
- launchApp:
    clearState: true
    stopApp: true

# Wait for splash to clear and one of the landing screens to mount
- extendedWaitUntil:
    visible:
      text: ".*"
    timeout: 20000

# Onboarding landing (most common cold start path)
- runFlow:
    when:
      visible:
        id: "onboarding-skip"
    commands:
      - assertVisible:
          id: "onboarding-skip"
      - assertVisible:
          id: "onboarding-next"
      - tapOn:
          id: "onboarding-skip"

# Login landing (post-onboarding)
- runFlow:
    when:
      visible:
        id: "login-input-email"
    commands:
      - assertVisible:
          id: "login-segment-login"
      - assertVisible:
          id: "login-segment-signup"
      - assertVisible:
          id: "login-input-email"
      - assertVisible:
          id: "login-input-password"
      - assertVisible:
          id: "login-submit"

# Already-authenticated landing
- runFlow:
    when:
      visible:
        id: "home-cta-diagnose"
    commands:
      - assertVisible:
          id: "home-cta-diagnose"
      - assertVisible:
          id: "tab-home"

- takeScreenshot: smoke-launch
