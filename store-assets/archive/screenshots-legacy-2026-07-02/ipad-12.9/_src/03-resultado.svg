<svg xmlns="http://www.w3.org/2000/svg" width="2048" height="2732" viewBox="0 0 2048 2732">
  <defs>
    <linearGradient id="cream" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F0EDE4"/>
      <stop offset="1" stop-color="#EDE8DC"/>
    </linearGradient>
    <linearGradient id="leafcard" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#143A28"/>
      <stop offset="1" stop-color="#0D2B1E"/>
    </linearGradient>
    <filter id="dshadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="30" stdDeviation="40" flood-color="#0D2B1E" flood-opacity="0.18"/>
    </filter>
  </defs>
  <rect width="2048" height="2732" fill="url(#cream)"/>

  <!-- Headline -->
  <text x="150" y="290" font-family="Poppins ExtraBold, Poppins" font-weight="800" font-size="150" fill="#0D2B1E">Resultado</text>
  <text x="150" y="450" font-family="Poppins ExtraBold, Poppins" font-weight="800" font-size="150" fill="#0D2B1E">completo + MIP</text>
  <text x="155" y="560" font-family="Poppins Regular, Poppins" font-weight="400" font-size="58" fill="#5b6b60">Praga, confiança e manejo integrado por nível</text>

  <!-- ===== iPad device frame ===== -->
  <g filter="url(#dshadow)">
    <rect x="524" y="680" width="1000" height="1940" rx="86" fill="#1c1c1e"/>
  </g>
  <clipPath id="scr03"><rect x="560" y="716" width="928" height="1868" rx="54"/></clipPath>
  <rect x="560" y="716" width="928" height="1868" rx="54" fill="#F4F1EA"/>
  <g clip-path="url(#scr03)">
    <rect x="560" y="716" width="928" height="1868" fill="#F4F1EA"/>

    <!-- status bar -->
    <text x="608" y="800" font-family="Poppins SemiBold, Poppins" font-weight="600" font-size="40" fill="#0D2B1E">9:41</text>
    <g fill="#0D2B1E"><circle cx="1360" cy="786" r="9"/><circle cx="1392" cy="786" r="9"/><circle cx="1424" cy="786" r="9"/></g>

    <!-- header -->
    <text x="1024" y="912" text-anchor="middle" font-family="Poppins Bold, Poppins" font-weight="700" font-size="62" fill="#0D2B1E">Diagnóstico</text>

    <!-- image card with leaf -->
    <rect x="608" y="970" width="832" height="560" rx="40" fill="url(#leafcard)"/>
    <g transform="translate(1024,1250)">
      <!-- leaf shape -->
      <path d="M 0 -180 C 150 -150 170 60 0 180 C -170 60 -150 -150 0 -180 Z" fill="#2f7d3f"/>
      <path d="M 0 -180 L 0 180" stroke="#1f5a2b" stroke-width="6"/>
      <path d="M 0 -60 L 90 -110 M 0 0 L 110 -30 M 0 60 L 90 50 M 0 -60 L -90 -110 M 0 0 L -110 -30 M 0 60 L -90 50" stroke="#1f5a2b" stroke-width="4"/>
      <!-- lesion dots -->
      <circle cx="-40" cy="-30" r="20" fill="#F4B400"/>
      <circle cx="55" cy="20" r="24" fill="#F4B400"/>
      <circle cx="10" cy="90" r="18" fill="#F4B400"/>
    </g>

    <!-- Praga Detectada badge + confiança -->
    <rect x="608" y="1570" width="832" height="120" rx="24" fill="#ffffff" stroke="#e3ddcf" stroke-width="2"/>
    <rect x="640" y="1602" width="290" height="58" rx="29" fill="#C0392B"/>
    <text x="785" y="1642" text-anchor="middle" font-family="Poppins SemiBold, Poppins" font-weight="600" font-size="36" fill="#ffffff">Praga Detectada</text>
    <text x="1408" y="1642" text-anchor="end" font-family="Poppins Medium, Poppins" font-weight="500" font-size="40" fill="#0D2B1E">Confiança: Alta</text>

    <!-- detected name -->
    <text x="608" y="1770" font-family="Poppins Bold, Poppins" font-weight="700" font-size="72" fill="#0D2B1E">Ferrugem Asiática</text>

    <!-- subhead -->
    <text x="608" y="1862" font-family="Poppins SemiBold, Poppins" font-weight="600" font-size="50" fill="#0D2B1E">Resumo do tratamento (MIP)</text>

    <!-- three columns -->
    <g>
      <rect x="608" y="1900" width="262" height="220" rx="28" fill="#ffffff" stroke="#e3ddcf" stroke-width="2"/>
      <text x="739" y="1984" text-anchor="middle" font-family="Poppins Bold, Poppins" font-weight="700" font-size="46" fill="#0D2B1E">Cultural</text>
      <text x="739" y="2040" text-anchor="middle" font-family="Poppins Regular, Poppins" font-weight="400" font-size="32" fill="#5b6b60">Manejo,</text>
      <text x="739" y="2078" text-anchor="middle" font-family="Poppins Regular, Poppins" font-weight="400" font-size="32" fill="#5b6b60">rotação</text>

      <rect x="893" y="1900" width="262" height="220" rx="28" fill="#ffffff" stroke="#e3ddcf" stroke-width="2"/>
      <text x="1024" y="1984" text-anchor="middle" font-family="Poppins Bold, Poppins" font-weight="700" font-size="46" fill="#0D2B1E">Biológico</text>
      <text x="1024" y="2040" text-anchor="middle" font-family="Poppins Regular, Poppins" font-weight="400" font-size="32" fill="#5b6b60">Inimigos</text>
      <text x="1024" y="2078" text-anchor="middle" font-family="Poppins Regular, Poppins" font-weight="400" font-size="32" fill="#5b6b60">naturais</text>

      <rect x="1178" y="1900" width="262" height="220" rx="28" fill="#ffffff" stroke="#e3ddcf" stroke-width="2"/>
      <text x="1309" y="1984" text-anchor="middle" font-family="Poppins Bold, Poppins" font-weight="700" font-size="46" fill="#0D2B1E">Químico</text>
      <text x="1309" y="2040" text-anchor="middle" font-family="Poppins Regular, Poppins" font-weight="400" font-size="32" fill="#5b6b60">Receituário</text>
    </g>

    <!-- disclaimer -->
    <rect x="608" y="2170" width="832" height="170" rx="24" fill="#FBF1D6" stroke="#E7C66B" stroke-width="2"/>
    <text x="648" y="2238" font-family="Poppins Medium, Poppins" font-weight="500" font-size="40" fill="#8a6d1f">Consulte um agrônomo com CREA ativo</text>
    <text x="648" y="2292" font-family="Poppins Medium, Poppins" font-weight="500" font-size="40" fill="#8a6d1f">antes de aplicar defensivos (Lei 7.802/89).</text>
  </g>
</svg>
