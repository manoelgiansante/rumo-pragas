<svg xmlns="http://www.w3.org/2000/svg" width="2048" height="2732" viewBox="0 0 2048 2732">
  <defs>
    <linearGradient id="cream" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F0EDE4"/>
      <stop offset="1" stop-color="#EDE8DC"/>
    </linearGradient>
    <filter id="dshadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="30" stdDeviation="40" flood-color="#0D2B1E" flood-opacity="0.18"/>
    </filter>
  </defs>
  <rect width="2048" height="2732" fill="url(#cream)"/>

  <!-- Headline -->
  <text x="150" y="290" font-family="Poppins ExtraBold, Poppins" font-weight="800" font-size="150" fill="#0D2B1E">Biblioteca</text>
  <text x="150" y="450" font-family="Poppins ExtraBold, Poppins" font-weight="800" font-size="150" fill="#0D2B1E">de pragas</text>
  <text x="155" y="560" font-family="Poppins Regular, Poppins" font-weight="400" font-size="58" fill="#5b6b60">Catálogo por cultura: soja, milho, café e mais</text>

  <!-- ===== iPad device frame ===== -->
  <g filter="url(#dshadow)">
    <rect x="524" y="680" width="1000" height="1940" rx="86" fill="#1c1c1e"/>
  </g>
  <clipPath id="scr04"><rect x="560" y="716" width="928" height="1868" rx="54"/></clipPath>
  <rect x="560" y="716" width="928" height="1868" rx="54" fill="#F4F1EA"/>
  <g clip-path="url(#scr04)">
    <rect x="560" y="716" width="928" height="1868" fill="#F4F1EA"/>

    <!-- status bar -->
    <text x="608" y="800" font-family="Poppins SemiBold, Poppins" font-weight="600" font-size="40" fill="#0D2B1E">9:41</text>
    <g fill="#0D2B1E"><circle cx="1360" cy="786" r="9"/><circle cx="1392" cy="786" r="9"/><circle cx="1424" cy="786" r="9"/></g>

    <!-- header -->
    <text x="608" y="912" font-family="Poppins Bold, Poppins" font-weight="700" font-size="62" fill="#0D2B1E">Biblioteca de Pragas</text>

    <!-- search bar -->
    <rect x="608" y="960" width="832" height="104" rx="52" fill="#ffffff" stroke="#e3ddcf" stroke-width="2"/>
    <g transform="translate(660,1012)" fill="none" stroke="#8a9389" stroke-width="5"><circle cx="0" cy="0" r="18"/><line x1="13" y1="13" x2="28" y2="28"/></g>
    <text x="712" y="1028" font-family="Poppins Regular, Poppins" font-weight="400" font-size="44" fill="#8a9389">Buscar por praga</text>

    <!-- filter chips -->
    <g font-family="Poppins SemiBold, Poppins" font-weight="600" font-size="40">
      <rect x="608" y="1104" width="180" height="84" rx="42" fill="#1f7a3a"/>
      <text x="698" y="1158" text-anchor="middle" fill="#ffffff">Todas</text>
      <rect x="808" y="1104" width="160" height="84" rx="42" fill="#ffffff" stroke="#e3ddcf" stroke-width="2"/>
      <text x="888" y="1158" text-anchor="middle" fill="#0D2B1E">Soja</text>
      <rect x="988" y="1104" width="170" height="84" rx="42" fill="#ffffff" stroke="#e3ddcf" stroke-width="2"/>
      <text x="1073" y="1158" text-anchor="middle" fill="#0D2B1E">Milho</text>
      <rect x="1178" y="1104" width="160" height="84" rx="42" fill="#ffffff" stroke="#e3ddcf" stroke-width="2"/>
      <text x="1258" y="1158" text-anchor="middle" fill="#0D2B1E">Café</text>
    </g>

    <!-- list rows -->
    <!-- row template: card y, leaf color, name, subtitle -->
    <g font-family="Poppins Bold, Poppins">
      <!-- 1 Ferrugem Asiática -->
      <rect x="608" y="1230" width="832" height="170" rx="28" fill="#ffffff" stroke="#e3ddcf" stroke-width="2"/>
      <g transform="translate(700,1315)"><circle cx="0" cy="0" r="50" fill="#C0392B" opacity="0.85"/><path d="M 0 -34 C 28 -28 32 12 0 34 C -32 12 -28 -28 0 -34 Z" fill="#ffffff" opacity="0.92"/></g>
      <text x="800" y="1305" font-family="Poppins Bold, Poppins" font-weight="700" font-size="52" fill="#0D2B1E">Ferrugem Asiática</text>
      <text x="800" y="1360" font-family="Poppins Regular, Poppins" font-weight="400" font-size="38" fill="#5b6b60">Soja · Doença fúngica</text>

      <!-- 2 Lagarta do Cartucho -->
      <rect x="608" y="1420" width="832" height="170" rx="28" fill="#ffffff" stroke="#e3ddcf" stroke-width="2"/>
      <g transform="translate(700,1505)"><circle cx="0" cy="0" r="50" fill="#E0A92E" opacity="0.9"/><path d="M 0 -34 C 28 -28 32 12 0 34 C -32 12 -28 -28 0 -34 Z" fill="#ffffff" opacity="0.92"/></g>
      <text x="800" y="1495" font-family="Poppins Bold, Poppins" font-weight="700" font-size="52" fill="#0D2B1E">Lagarta do Cartucho</text>
      <text x="800" y="1550" font-family="Poppins Regular, Poppins" font-weight="400" font-size="38" fill="#5b6b60">Milho · Praga · larva</text>

      <!-- 3 Broca do Café -->
      <rect x="608" y="1610" width="832" height="170" rx="28" fill="#ffffff" stroke="#e3ddcf" stroke-width="2"/>
      <g transform="translate(700,1695)"><circle cx="0" cy="0" r="50" fill="#1f7a3a"/><path d="M 0 -34 C 28 -28 32 12 0 34 C -32 12 -28 -28 0 -34 Z" fill="#ffffff" opacity="0.92"/></g>
      <text x="800" y="1685" font-family="Poppins Bold, Poppins" font-weight="700" font-size="52" fill="#0D2B1E">Broca do Café</text>
      <text x="800" y="1740" font-family="Poppins Regular, Poppins" font-weight="400" font-size="38" fill="#5b6b60">Café · Praga · besouro</text>

      <!-- 4 Mosca-branca -->
      <rect x="608" y="1800" width="832" height="170" rx="28" fill="#ffffff" stroke="#e3ddcf" stroke-width="2"/>
      <g transform="translate(700,1885)"><circle cx="0" cy="0" r="50" fill="#C0392B" opacity="0.7"/><path d="M 0 -34 C 28 -28 32 12 0 34 C -32 12 -28 -28 0 -34 Z" fill="#ffffff" opacity="0.92"/></g>
      <text x="800" y="1875" font-family="Poppins Bold, Poppins" font-weight="700" font-size="52" fill="#0D2B1E">Mosca-branca</text>
      <text x="800" y="1930" font-family="Poppins Regular, Poppins" font-weight="400" font-size="38" fill="#5b6b60">Algodão · Praga · sugadora</text>

      <!-- 5 Mofo-branco -->
      <rect x="608" y="1990" width="832" height="170" rx="28" fill="#ffffff" stroke="#e3ddcf" stroke-width="2"/>
      <g transform="translate(700,2075)"><circle cx="0" cy="0" r="50" fill="#C0392B" opacity="0.85"/><path d="M 0 -34 C 28 -28 32 12 0 34 C -32 12 -28 -28 0 -34 Z" fill="#ffffff" opacity="0.92"/></g>
      <text x="800" y="2065" font-family="Poppins Bold, Poppins" font-weight="700" font-size="52" fill="#0D2B1E">Mofo-branco</text>
      <text x="800" y="2120" font-family="Poppins Regular, Poppins" font-weight="400" font-size="38" fill="#5b6b60">Soja · Doença fúngica</text>
    </g>

    <!-- bottom tab bar -->
    <rect x="560" y="2440" width="928" height="144" fill="#ffffff"/>
    <line x1="560" y1="2440" x2="1488" y2="2440" stroke="#e3ddcf" stroke-width="2"/>
    <g font-family="Poppins Medium, Poppins" font-weight="500" font-size="30" text-anchor="middle">
      <g transform="translate(652,2480)" fill="none" stroke="#8a9389" stroke-width="4"><path d="M -22 18 L 0 0 L 22 18 L 22 40 L -22 40 Z"/></g>
      <text x="652" y="2556" fill="#8a9389">Início</text>
      <g transform="translate(862,2500)" fill="none" stroke="#8a9389" stroke-width="4"><circle cx="0" cy="0" r="22"/><path d="M 0 -12 L 0 0 L 12 8"/></g>
      <text x="862" y="2556" fill="#8a9389">Histórico</text>
      <g transform="translate(1024,2500)" stroke="#1f7a3a" stroke-width="4"><line x1="-20" y1="-20" x2="-20" y2="20"/><line x1="-8" y1="-20" x2="-8" y2="20"/><line x1="6" y1="-18" x2="14" y2="20"/><line x1="20" y1="-20" x2="20" y2="20"/></g>
      <text x="1024" y="2556" fill="#1f7a3a">Biblioteca</text>
      <g transform="translate(1186,2500)" fill="#8a9389"><path d="M 0 -22 L 6 -6 L 22 0 L 6 6 L 0 22 L -6 6 L -22 0 L -6 -6 Z"/></g>
      <text x="1186" y="2556" fill="#8a9389">Agro IA</text>
      <g transform="translate(1396,2500)" fill="none" stroke="#8a9389" stroke-width="4"><circle cx="0" cy="0" r="10"/><circle cx="0" cy="0" r="22"/></g>
      <text x="1396" y="2556" fill="#8a9389">Ajustes</text>
    </g>
  </g>
</svg>
