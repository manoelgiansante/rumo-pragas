<svg xmlns="http://www.w3.org/2000/svg" width="2048" height="2732" viewBox="0 0 2048 2732">
  <defs>
    <linearGradient id="cream" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F0EDE4"/>
      <stop offset="1" stop-color="#EDE8DC"/>
    </linearGradient>
    <linearGradient id="header" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#143A28"/>
      <stop offset="1" stop-color="#0D2B1E"/>
    </linearGradient>
    <linearGradient id="bubbleAI" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f6f3ec"/>
    </linearGradient>
    <filter id="dshadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="30" stdDeviation="40" flood-color="#0D2B1E" flood-opacity="0.18"/>
    </filter>
  </defs>
  <rect width="2048" height="2732" fill="url(#cream)"/>

  <!-- Headline -->
  <text x="150" y="290" font-family="Poppins ExtraBold, Poppins" font-weight="800" font-size="150" fill="#0D2B1E">Agro IA</text>
  <text x="150" y="450" font-family="Poppins ExtraBold, Poppins" font-weight="800" font-size="150" fill="#0D2B1E">no campo</text>
  <text x="155" y="560" font-family="Poppins Regular, Poppins" font-weight="400" font-size="58" fill="#5b6b60">Tire dúvidas de manejo direto com o assistente</text>

  <!-- ===== iPad device frame ===== -->
  <g filter="url(#dshadow)">
    <rect x="524" y="680" width="1000" height="1940" rx="86" fill="#1c1c1e"/>
  </g>
  <clipPath id="scr05"><rect x="560" y="716" width="928" height="1868" rx="54"/></clipPath>
  <rect x="560" y="716" width="928" height="1868" rx="54" fill="#F4F1EA"/>
  <g clip-path="url(#scr05)">
    <rect x="560" y="716" width="928" height="1868" fill="#F4F1EA"/>

    <!-- status bar -->
    <text x="608" y="800" font-family="Poppins SemiBold, Poppins" font-weight="600" font-size="40" fill="#0D2B1E">9:41</text>
    <g fill="#0D2B1E">
      <circle cx="1360" cy="786" r="9"/><circle cx="1392" cy="786" r="9"/><circle cx="1424" cy="786" r="9"/>
    </g>

    <!-- green header -->
    <rect x="560" y="828" width="928" height="190" fill="url(#header)"/>
    <g transform="translate(630,888)" fill="#F4B400"><path d="M 0 -34 L 9 -9 L 34 0 L 9 9 L 0 34 L -9 9 L -34 0 L -9 -9 Z"/></g>
    <text x="700" y="908" font-family="Poppins Bold, Poppins" font-weight="700" font-size="56" fill="#ffffff">Agro IA</text>
    <text x="700" y="966" font-family="Poppins Regular, Poppins" font-weight="400" font-size="36" fill="#cfe0d4">Assistente agrícola especializado</text>

    <!-- AI bubble 1 -->
    <rect x="608" y="1080" width="720" height="190" rx="34" fill="url(#bubbleAI)" stroke="#e3ddcf" stroke-width="2"/>
    <text x="650" y="1150" font-family="Poppins Regular, Poppins" font-weight="400" font-size="40" fill="#2b3a31">Olá! Sou seu agrônomo virtual.</text>
    <text x="650" y="1206" font-family="Poppins Regular, Poppins" font-weight="400" font-size="40" fill="#2b3a31">Como posso ajudar na sua lavoura</text>
    <text x="650" y="1246" font-family="Poppins Regular, Poppins" font-weight="400" font-size="40" fill="#2b3a31">hoje?</text>

    <!-- User bubble -->
    <rect x="688" y="1300" width="752" height="130" rx="34" fill="#1f7a3a"/>
    <text x="1400" y="1370" text-anchor="end" font-family="Poppins Regular, Poppins" font-weight="400" font-size="38" fill="#ffffff">Como controlar a ferrugem na soja?</text>

    <!-- AI bubble 2 -->
    <rect x="608" y="1460" width="800" height="430" rx="34" fill="url(#bubbleAI)" stroke="#e3ddcf" stroke-width="2"/>
    <text x="650" y="1530" font-family="Poppins SemiBold, Poppins" font-weight="600" font-size="42" fill="#0D2B1E">Manejo Integrado de Pragas (MIP):</text>
    <circle cx="668" cy="1598" r="12" fill="#1f7a3a"/>
    <text x="700" y="1612" font-family="Poppins Regular, Poppins" font-weight="400" font-size="38" fill="#2b3a31">Monitore o início da florada</text>
    <circle cx="668" cy="1668" r="12" fill="#1f7a3a"/>
    <text x="700" y="1682" font-family="Poppins Regular, Poppins" font-weight="400" font-size="38" fill="#2b3a31">Use cultivares resistentes</text>
    <circle cx="668" cy="1738" r="12" fill="#1f7a3a"/>
    <text x="700" y="1752" font-family="Poppins Regular, Poppins" font-weight="400" font-size="38" fill="#2b3a31">Fungicida só com recomendação</text>
    <text x="650" y="1838" font-family="Poppins Regular, Poppins" font-weight="400" font-size="32" fill="#8a9389" font-style="italic">Consulte sempre um agrônomo com CREA ativo.</text>

    <!-- suggestion chips -->
    <rect x="608" y="1940" width="400" height="96" rx="48" fill="#ffffff" stroke="#cde3d0" stroke-width="2"/>
    <text x="808" y="2000" text-anchor="middle" font-family="Poppins Medium, Poppins" font-weight="500" font-size="36" fill="#1f7a3a">Quando pulverizar?</text>
    <rect x="1028" y="1940" width="412" height="96" rx="48" fill="#ffffff" stroke="#cde3d0" stroke-width="2"/>
    <text x="1234" y="2000" text-anchor="middle" font-family="Poppins Medium, Poppins" font-weight="500" font-size="36" fill="#1f7a3a">Dose recomendada</text>

    <!-- input bar -->
    <rect x="608" y="2080" width="832" height="120" rx="60" fill="#ffffff" stroke="#e3ddcf" stroke-width="2"/>
    <text x="664" y="2152" font-family="Poppins Regular, Poppins" font-weight="400" font-size="40" fill="#9aa69d">Pergunte sobre sua cultura...</text>
    <circle cx="1378" cy="2140" r="50" fill="#1f7a3a"/>
    <path d="M 1356 2140 L 1396 2140 M 1382 2126 L 1398 2140 L 1382 2154" stroke="#ffffff" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- bottom tab bar -->
    <rect x="560" y="2440" width="928" height="144" fill="#ffffff"/>
    <line x1="560" y1="2440" x2="1488" y2="2440" stroke="#e3ddcf" stroke-width="2"/>
    <g font-family="Poppins Medium, Poppins" font-weight="500" font-size="30" text-anchor="middle">
      <g transform="translate(652,2480)" fill="none" stroke="#8a9389" stroke-width="4"><path d="M -22 18 L 0 0 L 22 18 L 22 40 L -22 40 Z"/></g>
      <text x="652" y="2556" fill="#8a9389">Início</text>
      <g transform="translate(862,2500)" fill="none" stroke="#8a9389" stroke-width="4"><circle cx="0" cy="0" r="22"/><path d="M 0 -12 L 0 0 L 12 8"/></g>
      <text x="862" y="2556" fill="#8a9389">Histórico</text>
      <g transform="translate(1024,2500)" stroke="#8a9389" stroke-width="4"><line x1="-20" y1="-20" x2="-20" y2="20"/><line x1="-8" y1="-20" x2="-8" y2="20"/><line x1="6" y1="-18" x2="14" y2="20"/><line x1="20" y1="-20" x2="20" y2="20"/></g>
      <text x="1024" y="2556" fill="#8a9389">Biblioteca</text>
      <g transform="translate(1186,2500)" fill="#1f7a3a"><path d="M 0 -22 L 6 -6 L 22 0 L 6 6 L 0 22 L -6 6 L -22 0 L -6 -6 Z"/></g>
      <text x="1186" y="2556" fill="#1f7a3a">Agro IA</text>
      <g transform="translate(1396,2500)" fill="none" stroke="#8a9389" stroke-width="4"><circle cx="0" cy="0" r="10"/><circle cx="0" cy="0" r="22"/></g>
      <text x="1396" y="2556" fill="#8a9389">Ajustes</text>
    </g>
  </g>
</svg>
