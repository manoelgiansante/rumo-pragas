# For detailed configuration reference documentation, visit:
# https://supabase.com/docs/guides/local-development/cli/config
# A string used to distinguish different Supabase projects on the same host. Defaults to the
# working directory name when running `supabase init`.
project_id = "rumo-pragas"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[db.migrations]
enabled = true
schema_paths = []

[realtime]
enabled = true

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://127.0.0.1:3000"
jwt_expiry = 3600

[edge_runtime]
enabled = true
policy = "per_worker"
inspector_port = 8083
deno_version = 2

# ── Per-function gateway verify_jwt overrides ──
# RC + Stripe webhooks authenticate via shared-secret in body/headers, NOT JWT.
# Gateway must let raw POST through; handler does its own auth (Bearer + HMAC).
# P0 incident 2026-05-21: revenuecat-webhook deployed with verify_jwt=true →
# all RC events returned 401 before reaching handler → zero subscriptions
# synced since launch. Fix: force verify_jwt=false here and on next deploy.
[functions.revenuecat-webhook]
verify_jwt = false

[functions.stripe-webhook]
verify_jwt = false

# Internal Pragas deletion worker validates the exact service-role secret in the
# handler. Gateway JWT parsing is disabled to support rotated sb_secret_* keys.
[functions.pragas-process-deletions]
verify_jwt = false

[functions.pragas-process-ai-idempotency]
verify_jwt = false

[functions.ai-chat-pragas]
verify_jwt = true

[functions.diagnose-pragas]
verify_jwt = true

[functions.report-ai-content]
verify_jwt = true

[functions.report-diagnosis-feedback]
verify_jwt = true

[functions.admin-ai-content-reports]
verify_jwt = true

[functions.pragas-analytics]
verify_jwt = true

[functions.pragas-delete-user-account]
verify_jwt = true

[functions.pragas-export-user-data]
verify_jwt = true

[functions.pragas-reactivate-account]
verify_jwt = true

# Public status lookup and authenticated begin/confirm share one endpoint.
# Gateway verification is intentionally disabled because status is public;
# begin/confirm validate Bearer JWTs with auth.getUser inside the handler.
[functions.pragas-global-account-deletion]
verify_jwt = false

[functions.pragas-send-push]
verify_jwt = false

# Dedicated legacy Pragas slugs are tombstoned locally so a future function
# sync cannot resurrect billing or the retired disease-risk contract. Generic
# portfolio billing/webhook functions above remain untouched.
[functions.create-checkout-session-pragas]
verify_jwt = true

[functions.stripe-customer-portal-pragas]
verify_jwt = true

[functions.asaas-checkout-pragas]
verify_jwt = true

[functions.disease-risk]
verify_jwt = true

[functions.stripe-webhook-pragas]
verify_jwt = false

[functions.asaas-webhook-pragas]
verify_jwt = false

# waitlist accepts anonymous POSTs from public landing page
[functions.waitlist-campovivo]
verify_jwt = false

# send-push triggered by server-to-server cron / triggers via service_role; no end-user JWT
[functions.send-push]
verify_jwt = false
